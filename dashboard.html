<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f9;
}

.topbar {
  background: #0c3c60;
  color: white;
  padding: 12px 20px;
  display: flex;
  align-items: center;
}

.topbar img {
  height: 35px;
  margin-right: 10px;
}

.main {
  display: flex;
}

.sidebar {
  width: 230px;
  background: #123d5c;
  color: white;
  height: 100vh;
  padding: 20px;
}

.profile {
  text-align: center;
  margin-bottom: 20px;
}

.profile img {
  width: 80px;
  border-radius: 50%;
}

.menu a {
  display: block;
  padding: 10px;
  margin: 5px 0;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}

.menu a:hover,
.active {
  background: #1e5c85;
}

.content {
  flex: 1;
  padding: 20px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.card {
  background: #0c3c60;
  color: white;
  padding: 15px;
  border-radius: 8px;
  position: relative;
}

.percent {
  position: absolute;
  right: 0;
  bottom: 0;
  background: #ff9800;
  padding: 5px 10px;
  border-radius: 5px 0 8px 0;
  font-weight: bold;
}

.graph {
  background: white;
  margin-top: 20px;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="topbar">
  <img src="images/logo.png">
  <h3>Chandigarh University</h3>
</div>

<div class="main">

<div class="sidebar">
  <div class="profile">
    <img src="images/user.png">
    <h4 id="name">Student</h4>
  </div>
