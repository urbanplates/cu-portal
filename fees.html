<!DOCTYPE html>
<html>
<head>
<title>Fees</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6f9; }

.topbar {
  background:#0c3c60;
  color:white;
  padding:12px 20px;
}

.main { display:flex; }

.sidebar {
  width:230px;
  background:#123d5c;
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar a {
  display:block;
  padding:10px;
  color:white;
  text-decoration:none;
}

.sidebar a.active {
  background:#1e5c85;
  border-radius:5px;
}

.content { flex:1; padding:20px; }

.card {
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.progress {
  background:#ddd;
  height:12px;
  border-radius:6px;
}

.progress-bar {
  height:12px;
  background:green;
  border-radius:6px;
  width:0%;
}

table {
  width:100%;
  border-collapse:collapse;
}

th {
  background:#0c3c60;
  color:white;
  padding:10px;
}

td {
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

.btn {
  padding:6px 12px;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
}

.pay { background:green; }
.download { background:#0c3c60; }
</style>
</head>

<body>

<div class="topbar">
  <h3>Chandigarh University</h3>
</div>

<div class="main">

<div class="sidebar">
  <div style="text-align:center;">
    <img src="images/user.png" style="width:80px; border-radius:50%;">
    <h4 id="name">Student</h4>
  </div>

  <a href="dashboard.html">📊 Dashboard</a>
  <a class="active">💰 Fees</a>
  <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<div class="content">

<div class="card">
  <h3>Fees Summary</h3>
  <p>Paid: ₹<span id="paid">0</span></p>
  <p>Pending: ₹<span id="pending">0</span></p>

  <div class="progress">
    <div id="bar" class="progress-bar"></div>
  </div>

  <h4 id="status"></h4>
</div>

<div class="card">
  <h3>Installments</h3>

  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>Amount</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

</div>
</div>

<script>

// ✅ SAFE LOGIN CHECK
const user = JSON.parse(localStorage.getItem("user") || "null");

if(!user){
  window.location.href = "login.html";
}

document.getElementById("name").innerText = user.name;

// ✅ FETCH FEES DATA
fetch("/fees/" + user.username)
.then(res => res.json())
.then(data => {

  if(!data.success){
    alert("Failed to load fees data");
    return;
  }

  let pending = data.total_fees - data.paid_amount;

  document.getElementById("paid").innerText = data.paid_amount;
  document.getElementById("pending").innerText = pending;

  // ✅ PROGRESS BAR FIX
  let percent = (data.paid_amount / data.total_fees) * 100;
  if(percent > 100) percent = 100;

  document.getElementById("bar").style.width = percent + "%";

  const status = document.getElementById("status");

  if(pending === 0){
    status.innerText = "✔ All Fees Cleared";
    status.style.color = "green";
  } else {
    status.innerText = "⚠ Pending Fees";
    status.style.color = "red";
  }

  const table = document.getElementById("table");
  table.innerHTML = "";

  data.installments.forEach(i => {

    let btn = "";

    if(i.status === "Paid"){
      btn = <button class="btn download">Download</button>;
    } else {
      btn = <button class="btn pay" onclick="payNow(${i.no}, ${i.amount})">Pay Now</button>;
    }

    table.innerHTML += `
      <tr>
        <td>${i.no}</td>
        <td>₹${i.amount}</td>
        <td style="color:${i.status === "Paid" ? "green" : "red"}">
          ${i.status}<br>${btn}
        </td>
      </tr>
    `;
  });

})
.catch(err => {
  console.log(err);
  alert("Server error. Please try again later.");
});

// ✅ REDIRECT TO PAYMENT
function payNow(no, amount){
  window.location.href = payment.html?amount=${amount}&installment=${no};
}

// ✅ LOGOUT
function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

</script>

</body>
</html>
